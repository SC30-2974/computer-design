<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新能源财报智能体系统</title>
  <style>
    :root {
      /* 现代清爽的配色方案 */
      --bg: #f4f7f6;
      --panel: #ffffff;
      --text-dark: #1e293b;
      --text: #334155;
      --muted: #64748b;
      --brand: #0f766e;
      --brand-hover: #115e59;
      --brand-light: #ccfbf1;
      --line: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
    }

    .shell {
      width: min(1280px, 94vw);
      margin: 0 auto 60px;
    }

    /* 优化后的顶部导航/标题 */
    .app-header {
      padding: 36px 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 0.5px;
    }

    .app-header .badge {
      padding: 6px 12px;
      background: var(--brand-light);
      color: var(--brand);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
    }

    .card h2 {
      margin: 0;
      font-size: 18px;
      color: var(--text-dark);
      font-weight: 600;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .subtext {
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
      margin-top: 6px;
    }

    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-7 { grid-column: span 7; }
    .span-6 { grid-column: span 6; }
    .span-5 { grid-column: span 5; }
    .span-4 { grid-column: span 4; }

    .chips, .prompt-grid, .company-grid, .detail-grid {
      display: grid;
      gap: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .prompt-grid { grid-template-columns: repeat(2, 1fr); }
    .company-grid { grid-template-columns: repeat(3, 1fr); }
    .detail-grid { grid-template-columns: repeat(1, 1fr); gap: 12px; }

    .panel, .company {
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg);
      transition: border-color 0.2s;
    }

    .company {
      cursor: pointer;
    }

    .company:hover {
      border-color: var(--brand);
      background: var(--panel);
      box-shadow: var(--shadow-sm);
    }

    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input, select, button {
      font: inherit;
      outline: none;
    }

    input, select {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fafafa;
      color: var(--text-dark);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-light);
      background: #fff;
    }

    input { flex: 1 1 200px; }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      color: white;
      background: var(--brand);
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: var(--brand-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    /* 次级按钮样式用于示例问题 */
    .btn-secondary {
      background: white;
      color: var(--brand);
      border: 1px solid var(--brand);
    }
    .btn-secondary:hover {
      background: var(--brand-light);
    }

    .output {
      margin-top: 16px;
      min-height: 120px;
      padding: 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--line);
      white-space: pre-wrap;
      line-height: 1.7;
      color: var(--text);
      font-size: 14px;
    }

    .embed-shell {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #f8fafc;
    }

    .embed-shell iframe {
      display: block;
      width: 100%;
      min-height: 700px;
      border: 0;
    }

    .metric-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .bars {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 100px 1fr 80px;
      gap: 16px;
      align-items: center;
      font-size: 14px;
    }

    .track {
      height: 16px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: 999px;
      background: var(--brand);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .company strong {
      display: block;
      margin-top: 8px;
      font-size: 16px;
      color: var(--text-dark);
    }

    .company div {
      font-size: 12px;
      color: var(--brand);
      font-weight: 600;
    }

    .company small, .panel small {
      display: block;
      margin-top: 6px;
      line-height: 1.5;
      color: var(--muted);
      font-size: 13px;
    }

    .panel div {
      font-size: 12px;
      font-weight: 600;
      color: var(--brand);
      margin-bottom: 4px;
    }

    .panel strong {
      color: var(--text-dark);
      font-size: 15px;
    }

    @media (max-width: 1024px) {
      .span-8, .span-7, .span-6, .span-5, .span-4 { grid-column: span 12; }
    }
    @media (max-width: 768px) {
      .prompt-grid, .company-grid { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 80px 1fr 60px; }
      .app-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="app-header">
      <h1>新能源财报智能体系统</h1>
      <div class="badge">2025 Q1-Q3</div>
    </header>

    <section class="grid">
      <article class="card span-8">
        <div class="card-head">
          <div>
            <h2>智能问答</h2>
            <div class="subtext">直接在页面内使用在线智能体提问，无需跳转到其他界面。</div>
          </div>
          <div class="chips">
            <span class="chip">Dify 嵌入</span>
            <span class="chip">支持麦克风</span>
          </div>
        </div>
        <div class="embed-shell">
          <iframe
            src="https://udify.app/chatbot/v2rkJLTx9Z9hWdS3"
            title="新能源财报智能体"
            style="width: 100%; height: 100%; min-height: 700px"
            frameborder="0"
            allow="microphone">
          </iframe>
        </div>
      </article>

      <article class="card span-4">
        <div class="card-head">
          <div>
            <h2>分析报告</h2>
            <div class="subtext">基于 PDF 中各企业 2025 年前三季度财报口径输出核心指标、经营摘要、机会与风险。</div>
          </div>
        </div>
        <div class="input-row">
          <select id="companySelect"></select>
          <button id="genBtn" style="width:100%">生成报告</button>
        </div>
        <div id="reportBox" class="output" style="min-height: 250px;">请选择企业并生成报告。</div>
      </article>

      <article class="card span-7">
        <div class="card-head">
          <div>
            <h2>企业筛选与浏览</h2>
            <div class="subtext">展示已从 PDF 提取并整理的前三季度企业数据，点击卡片可查看右侧详细画像。</div>
          </div>
        </div>
        <div class="input-row">
          <input id="searchInput" placeholder="搜索企业名称" />
          <select id="sectorFilter"></select>
          <button id="searchBtn">筛选</button>
        </div>
        <div id="companyGrid" class="company-grid" style="margin-top:16px"></div>
      </article>

      <article class="card span-5">
        <div class="card-head">
          <div>
            <h2>企业画像</h2>
            <div class="subtext">结合报告主营描述和三季报表现，查看企业摘要、机会与风险。</div>
          </div>
        </div>
        <div id="detailGrid" class="detail-grid">
          <div class="output" style="margin-top:0;">请在左侧点击企业卡片查看画像。</div>
        </div>
      </article>

      <article class="card span-12">
        <div class="card-head">
          <div>
            <h2>横向指标对比</h2>
            <div class="subtext">基于同一份 PDF 的三季报数据，按赛道过滤并切换营收、净利润、毛利率进行对比。</div>
          </div>
          <div id="metricMeta" class="metric-meta"></div>
        </div>
        <div class="input-row" style="margin-bottom:20px">
          <select id="metricSelect">
            <option value="revenue">营收（亿元）</option>
            <option value="profit">净利润（亿元）</option>
            <option value="margin">毛利率（%）</option>
          </select>
          <select id="metricSectorFilter"></select>
          <button id="refreshBtn">刷新图表</button>
        </div>
        <div id="bars" class="bars"></div>
      </article>
    </section>
  </main>

  <script>
    // companyCache 保存当前筛选结果，静态模式用于 GitHub Pages / file 直开场景兜底。
    let companyCache = [];
    let useStaticMode = location.hostname.endsWith("github.io") || location.protocol === "file:";

    const STATIC_DB = {
      modules: [
        { title: "智能问答", detail: "输入自然语言问题，返回指标结论和来源说明。" },
        { title: "指标分析", detail: "对比不同企业的营收、净利润和毛利率表现。" },
        { title: "企业画像", detail: "查看赛道归属、经营摘要、机会与风险。" },
        { title: "报告生成", detail: "按统一模板生成企业分析简报。" }
      ],
      companies: [
        { name: "比亚迪", sector: "整车+电池+光伏", revenue: 5662.66, profit: 233.33, margin: 17.9, year: 2025, period: "2025 年前三季度", summary: "主营新能源汽车、手机部件及组装、二次充电电池与光伏业务，汽车电动化与智能化仍是核心增长主线。", opportunity: "新能源汽车、电池和储能协同推进，全球化与智能化布局仍有望继续释放增量。", risk: "前三季度归母净利润同比下降 7.55%，行业价格竞争与海外经营环境变化仍会影响盈利表现。", source: "《各企业2025年财报数据（一季度至三季度）》中比亚迪股份有限公司 2025 年第三季度报告，第 210-218 页。" },
        { name: "恩捷股份", sector: "锂电隔膜", revenue: 95.43, profit: -0.86, margin: 15.9, year: 2025, period: "2025 年前三季度", summary: "核心产品覆盖锂电池隔离膜、BOPP 薄膜和包装印刷品，隔膜业务覆盖动力、消费和储能电池客户。", opportunity: "全球新能源与储能需求仍在增长，隔膜龙头地位和海外客户覆盖有助于稳固市场份额。", risk: "隔膜行业竞争加剧、价格下行，前三季度归母净利润转负，盈利修复仍需观察。", source: "《各企业2025年财报数据（一季度至三季度）》中云南恩捷新材料股份有限公司 2025 年第三季度报告，第 381-391 页。" },
        { name: "隆基绿能", sector: "光伏组件", revenue: 509.15, profit: -34.03, margin: 1.2, year: 2025, period: "2025 年前三季度", summary: "主营光伏硅片、电池组件及解决方案，处于光伏制造与全球化布局核心环节。", opportunity: "供给侧改革与技术创新若持续推进，海外新兴市场和高效产品有望带来盈利修复空间。", risk: "光伏供需失衡、低价竞争和贸易壁垒仍在，前三季度仍处亏损状态。", source: "《各企业2025年财报数据（一季度至三季度）》中隆基绿能科技股份有限公司 2025 年第三季度报告，第 645-656 页。" },
        { name: "宁德时代", sector: "动力电池+储能", revenue: 2830.72, profit: 490.34, margin: 25.3, year: 2025, period: "2025 年前三季度", summary: "主营动力电池与储能电池，具备从材料、电池系统到回收的全链条研发与产业化能力。", opportunity: "动力电池全球市占率和储能电池产量继续领先，动力与储能双轮驱动仍具扩张空间。", risk: "产品价格与汇率波动仍是经营管理重点，全球化扩张下对成本与外部政策的敏感度较高。", source: "《各企业2025年财报数据（一季度至三季度）》中宁德时代新能源科技股份有限公司 2025 年第三季度报告，第 850-858 页。" },
        { name: "阳光电源", sector: "逆变器+储能", revenue: 664.02, profit: 118.81, margin: 34.9, year: 2025, period: "2025 年前三季度", summary: "聚焦光伏逆变器、储能系统、风电变流及氢能等清洁能源装备，并提供全生命周期解决方案。", opportunity: "全球光伏与储能装机保持高增，逆变器和储能系统需求仍在扩张。", risk: "市场竞争加剧带来毛利率下滑风险，海外政策和项目交付节奏也会影响业绩兑现。", source: "《各企业2025年财报数据（一季度至三季度）》中阳光电源股份有限公司 2025 年第三季度报告，第 1066-1074 页。" },
        { name: "亿纬锂能", sector: "消费+动力+储能电池", revenue: 450.02, profit: 28.16, margin: 16.0, year: 2025, period: "2025 年前三季度", summary: "主营消费电池、动力电池和储能电池，覆盖智慧生活、绿色交通和能源转型等多元场景。", opportunity: "满产满销与市占率提升推动前三季度营收增长 32.17%，储能和动力业务仍有扩张空间。", risk: "前三季度归母净利润同比下降 11.70%，仍需继续消化费用与减值等盈利扰动。", source: "《各企业2025年财报数据（一季度至三季度）》中惠州亿纬锂能股份有限公司 2025 年第三季度报告，第 1286-1295 页。" },
        { name: "通威股份", sector: "光伏+硅料", revenue: 646.0, profit: -52.7, margin: 2.7, year: 2025, period: "2025 年前三季度", summary: "以农业与新能源双主业协同发展，光伏产业链覆盖硅料、电池等关键环节。", opportunity: "报告指出产业链价格在本报告期内已有回升，单季盈利指标出现持续改善。", risk: "光伏主产业仍处低景气区间，前三季度归母净利润为负，行业波动对业绩影响明显。", source: "《各企业2025年财报数据（一季度至三季度）》中通威股份有限公司 2025 年第三季度报告，第 1503-1512 页。" }
      ]
    };

    // 前端静态模式下也保持和后端相同的来源说明格式。
    function sourceText(company) {
      return "数据来源：" + company.source + " 毛利率优先采用报告披露口径，未直接披露时按前三季度营业收入与营业成本测算。";
    }

    // 报告区直接复用这一套模板，确保静态模式和后端模式输出结构一致。
    function buildStaticReport(company) {
      const avgMargin = STATIC_DB.companies.reduce(function (sum, item) { return sum + item.margin; }, 0) / STATIC_DB.companies.length;
      const gap = Math.round((company.margin - avgMargin) * 10) / 10;
      return (
        company.name + "分析简报\n" +
        "1. 核心指标：" + company.period + "营业收入约 " + company.revenue + " 亿元，归母净利润约 " + company.profit + " 亿元，毛利率约 " + company.margin + "%。\n" +
        "2. 行业定位：企业位于" + company.sector + "方向，毛利率较样本均值" + (gap >= 0 ? "高于 " : "低于 ") + Math.abs(gap) + " 个百分点。\n" +
        "3. 经营摘要：" + company.summary + "\n" +
        "4. 潜在机会：" + company.opportunity + "\n" +
        "5. 主要风险：" + company.risk + "\n" +
        sourceText(company)
      );
    }

    // 这里提供一个最小可用问答兜底，避免 GitHub Pages 上没有后端时整个页面失效。
    function answerStaticQuestion(question) {
      const q = question.trim();
      const company = STATIC_DB.companies.find(function (item) { return q.indexOf(item.name) >= 0; });
      if (!q) return { answer: "请输入问题内容。" };
      if (company && q.indexOf("净利润") >= 0) return { answer: company.name + company.period + "归母净利润约 " + company.profit + " 亿元。\n" + sourceText(company) };
      if (company && q.indexOf("营收") >= 0) return { answer: company.name + company.period + "营业收入约 " + company.revenue + " 亿元。\n" + sourceText(company) };
      if (company && q.indexOf("毛利率") >= 0) return { answer: company.name + company.period + "毛利率约 " + company.margin + "%。\n" + sourceText(company) };
      if (company && (q.indexOf("风险") >= 0 || q.indexOf("机会") >= 0)) {
        return { answer: company.name + "的潜在机会：" + company.opportunity + "\n" + company.name + "的主要风险：" + company.risk + "\n" + sourceText(company) };
      }
      if (q.indexOf("毛利率") >= 0 && q.indexOf("比亚迪") >= 0 && q.indexOf("宁德时代") >= 0) {
        return { answer: "毛利率对比：宁德时代 25.3%，比亚迪 17.9%，宁德时代更高。\n数据来源：《各企业2025年财报数据（一季度至三季度）》对应企业三季报。" };
      }
      if (q.indexOf("趋势") >= 0 || q.indexOf("机会") >= 0) {
        return { answer: "从已整理的三季报看，动力电池与储能企业仍保持较强增长韧性，光伏制造环节则继续承受供需失衡与价格竞争压力。\n数据来源：《各企业2025年财报数据（一季度至三季度）》对应企业三季报。" };
      }
      return { answer: "当前支持企业前三季度营收、净利润、毛利率、企业机会与风险等问题。\n你可以直接提问：宁德时代净利润是多少？ 阳光电源有哪些风险？" };
    }

    // 把本地静态数据包装成“假接口”，这样页面逻辑可以统一走 requestJson。
    function localRequestJson(url, options) {
      const urlObj = new URL(url, "https://local.test");
      const path = urlObj.pathname;
      const params = urlObj.searchParams;

      if (path === "/api/overview") {
        return Promise.resolve({
          companyCount: STATIC_DB.companies.length,
          sectorCount: new Set(STATIC_DB.companies.map(function (item) { return item.sector; })).size,
          moduleCount: STATIC_DB.modules.length,
          modules: STATIC_DB.modules
        });
      }

      if (path === "/api/sectors") {
        return Promise.resolve({
          items: Array.from(new Set(STATIC_DB.companies.map(function (item) { return item.sector; }))).sort()
        });
      }

      if (path === "/api/companies") {
        const keyword = params.get("keyword") || "";
        const sector = params.get("sector") || "";
        const items = STATIC_DB.companies.filter(function (item) {
          const sectorOk = !sector || item.sector === sector;
          const keywordOk = !keyword || item.name.indexOf(keyword) >= 0 || item.sector.indexOf(keyword) >= 0;
          return sectorOk && keywordOk;
        });
        return Promise.resolve({ items: items });
      }

      if (path.indexOf("/api/company/") === 0) {
        const companyName = decodeURIComponent(path.replace("/api/company/", ""));
        const company = STATIC_DB.companies.find(function (item) { return item.name === companyName; });
        if (!company) return Promise.reject(new Error("未找到企业：" + companyName));
        return Promise.resolve({ item: company });
      }

      if (path === "/api/metrics") {
        const metric = params.get("metric") || "revenue";
        const sector = params.get("sector") || "";
        const items = STATIC_DB.companies
          .filter(function (item) { return !sector || item.sector === sector; })
          .map(function (item) {
            return { name: item.name, sector: item.sector, value: item[metric] };
          });
        return Promise.resolve({ metric: metric, items: items });
      }

      if (path === "/api/ask") {
        const body = options && options.body ? JSON.parse(options.body) : { question: "" };
        return Promise.resolve(answerStaticQuestion(body.question || ""));
      }

      if (path === "/api/report") {
        const body = options && options.body ? JSON.parse(options.body) : { company: "" };
        const company = STATIC_DB.companies.find(function (item) { return item.name === body.company; });
        if (!company) return Promise.reject(new Error("未找到企业：" + body.company));
        return Promise.resolve({ report: buildStaticReport(company) });
      }

      return Promise.reject(new Error("静态模式下未实现接口：" + path));
    }

    // 优先请求真实后端；如果失败，再自动切换到静态模式。
    async function requestJson(url, options) {
      if (useStaticMode) {
        return localRequestJson(url, options);
      }

      try {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options
        });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || ("请求失败：" + response.status));
        }
        return response.json();
      } catch (error) {
        useStaticMode = true;
        console.warn("API 不可用，已切换为静态模式。", error);
        return localRequestJson(url, options);
      }
    }

    // 横向对比图本质上是自定义进度条，用最少结构完成轻量可视化。
    function createBarRow(item, maxValue) {
      const row = document.createElement("div");
      row.className = "bar-row";
      const width = Math.max(2, Math.round(item.value / maxValue * 100)); // 最小宽度保障
      row.innerHTML =
        "<div style='font-weight:500;'>" + item.name + "</div>" +
        "<div class='track'><div class='fill' style='width:" + width + "%'></div></div>" +
        "<div style='text-align:right; font-family:monospace; font-size:15px;'>" + item.value + "</div>";
      return row;
    }

    // 兼容可能遗留的接口调用，即使模块被删除了也不报错
    function renderModules(items) {
      const root = document.getElementById("moduleGrid");
      if (!root) return;
      root.innerHTML = "";
      items.forEach(function (item) {
        const node = document.createElement("div");
        node.className = "metric-box";
        node.innerHTML = "<div>模块</div><strong>" + item.title + "</strong><small>" + item.detail + "</small>";
        root.appendChild(node);
      });
    }

    // 下拉框渲染统一走这个函数，避免多个地方重复写 option 创建逻辑。
    function renderSelectOptions(select, items, includeAllText) {
      if(!select) return;
      select.innerHTML = "";
      if (includeAllText) {
        const all = document.createElement("option");
        all.value = "";
        all.textContent = includeAllText;
        select.appendChild(all);
      }
      items.forEach(function (item) {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        select.appendChild(option);
      });
    }

    // 左侧企业卡片和右上报告选择框都依赖同一份企业列表。
    function renderCompanies(items) {
      companyCache = items;
      const root = document.getElementById("companyGrid");
      const select = document.getElementById("companySelect");
      if(root) root.innerHTML = "";
      if(select) select.innerHTML = "";

      items.forEach(function (item, index) {
        if(root) {
            const card = document.createElement("div");
            card.className = "company";
            card.innerHTML =
            "<div>" + item.sector + "</div>" +
            "<strong>" + item.name + "</strong>" +
            "<small>营收 " + item.revenue + " 亿</small>" +
            "<small>净利 " + item.profit + " 亿</small>";
            card.addEventListener("click", function () {
            loadCompanyDetail(item.name).catch(function (error) {
                document.getElementById("detailGrid").innerHTML = "<div class='panel'>" + error.message + "</div>";
            });
            });
            root.appendChild(card);
        }

        if(select) {
            const option = document.createElement("option");
            option.value = item.name;
            option.textContent = item.name;
            select.appendChild(option);
        }

        // 默认展示第一家企业的画像，避免右侧出现空白状态。
        if (index === 0) {
          renderCompanyDetail(item);
        }
      });
      
      // 处理被删除元素的兼容
      const hc = document.getElementById("heroCompanies");
      if(hc) hc.textContent = items.length + " 家";
    }

    // 企业画像拆成三个信息块，方便后续继续扩展来源、亮点等字段。
    function renderCompanyDetail(item) {
      const root = document.getElementById("detailGrid");
      if(!root) return;
      root.innerHTML = "";
      [
        { title: "企业概况", text: item.summary },
        { title: "潜在机会", text: item.opportunity },
        { title: "主要风险", text: item.risk }
      ].forEach(function (block) {
        const node = document.createElement("div");
        node.className = "panel";
        node.innerHTML = "<div>" + block.title + "</div><strong>" + item.name + "</strong><small>" + block.text + "</small>";
        root.appendChild(node);
      });
    }

    // 这部分当前主要是兼容保留接口，页面没有对应模块时会自动跳过。
    async function loadOverview() {
      try {
        const data = await requestJson("/api/overview");
        const hs = document.getElementById("heroSectors");
        if(hs) hs.textContent = data.sectorCount + " 个";
        const hm = document.getElementById("heroModules");
        if(hm) hm.textContent = data.moduleCount + " 个";
        renderModules(data.modules);
      } catch(e) { console.log("Overview init skipped."); }
    }

    // 同步更新企业筛选和指标筛选两个下拉框。
    async function loadSectors() {
      const data = await requestJson("/api/sectors");
      renderSelectOptions(document.getElementById("sectorFilter"), data.items, "全部赛道");
      renderSelectOptions(document.getElementById("metricSectorFilter"), data.items, "全部赛道");
    }

    // 读取当前筛选条件后重新获取企业列表。
    async function loadCompanies() {
      const keyword = document.getElementById("searchInput").value.trim();
      const sector = document.getElementById("sectorFilter").value;
      const query = new URLSearchParams();
      if (keyword) query.set("keyword", keyword);
      if (sector) query.set("sector", sector);
      const url = "/api/companies" + (query.toString() ? "?" + query.toString() : "");
      const data = await requestJson(url);
      renderCompanies(data.items);
    }

    async function loadCompanyDetail(companyName) {
      const data = await requestJson("/api/company/" + encodeURIComponent(companyName));
      renderCompanyDetail(data.item);
    }

    // 指标图支持按赛道过滤，并且可在营收 / 净利润 / 毛利率之间切换。
    async function loadMetrics() {
      const metric = document.getElementById("metricSelect").value;
      const sector = document.getElementById("metricSectorFilter").value;
      const labels = {
        revenue: "营收（亿元）",
        profit: "净利润（亿元）",
        margin: "毛利率（%）"
      };
      const query = new URLSearchParams({ metric: metric });
      if (sector) query.set("sector", sector);
      const data = await requestJson("/api/metrics?" + query.toString());
      const root = document.getElementById("bars");
      if(!root) return;
      root.innerHTML = "";
      const values = data.items.map(function (item) { return item.value; });
      const maxValue = Math.max.apply(null, values.concat([1]));
      data.items.forEach(function (item) {
        root.appendChild(createBarRow(item, maxValue));
      });
      const meta = document.getElementById("metricMeta");
      if(meta) meta.textContent = "当前展示：" + labels[metric] + (sector ? " · " + sector : " · 全部赛道");
    }

    // 报告区只负责展示文本，由后端或静态兜底返回完整内容。
    async function generateReport() {
      const company = document.getElementById("companySelect").value;
      document.getElementById("reportBox").textContent = "生成中，请稍候...";
      const data = await requestJson("/api/report", {
        method: "POST",
        body: JSON.stringify({ company: company })
      });
      document.getElementById("reportBox").textContent = data.report;
    }

    // 所有交互都集中在这里绑定，后续查问题会更直观。
    document.getElementById("searchBtn")?.addEventListener("click", function () {
      loadCompanies().catch(function (error) {
        document.getElementById("companyGrid").innerHTML = "<div class='panel'>筛选失败：" + error.message + "</div>";
      });
    });

    document.getElementById("sectorFilter")?.addEventListener("change", function () {
      loadCompanies().catch(function (error) {
        document.getElementById("companyGrid").innerHTML = "<div class='panel'>筛选失败：" + error.message + "</div>";
      });
    });

    document.getElementById("refreshBtn")?.addEventListener("click", function () {
      loadMetrics().catch(function (error) {
        document.getElementById("metricMeta").textContent = "图表刷新失败：" + error.message;
      });
    });

    document.getElementById("metricSelect")?.addEventListener("change", function () {
      loadMetrics().catch(function (error) {
        document.getElementById("metricMeta").textContent = "图表刷新失败：" + error.message;
      });
    });

    document.getElementById("metricSectorFilter")?.addEventListener("change", function () {
      loadMetrics().catch(function (error) {
        document.getElementById("metricMeta").textContent = "图表刷新失败：" + error.message;
      });
    });

    document.getElementById("genBtn")?.addEventListener("click", function () {
      generateReport().catch(function (error) {
        document.getElementById("reportBox").textContent = "报告生成失败：" + error.message;
      });
    });

    // 页面首次加载时并行初始化，减少首屏等待时间。
    Promise.all([
      loadOverview(),
      loadSectors(),
      loadCompanies(),
      loadMetrics()
    ]).catch(function (error) {
      const box = document.getElementById("reportBox");
      if(box) box.textContent = "页面初始化失败：" + error.message;
    });
  </script>
</body>
</html>
